services:
  - type: web
    name: joyage-kanban
    runtime: node
    plan: starter
    region: singapore
    repo: https://github.com/Goodpipi/joyage-kanban
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: DATA_DIR
        value: /var/data
      - key: KANBAN_HISTORY_MAX
        value: "100"
    disk:
      name: kanban-data
      mountPath: /var/data
      sizeGB: 1
