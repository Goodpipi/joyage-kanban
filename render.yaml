services:
  - type: web
    name: joyage-kanban
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/Goodpipi/joyage-kanban
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
